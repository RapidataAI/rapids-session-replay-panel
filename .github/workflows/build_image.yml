name: Deployment to GHCR and GAR

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string

env:
  GHCR_REGISTRY: ghcr.io
  REGION: europe-west4
  GHCR_IMAGE: ghcr.io/rapidataai/rapids-session-replay-panel
  GAR_IMAGE: europe-west4-docker.pkg.dev/${{ secrets.GCP_COMMON_PROJECT_ID }}/rapidata-internal/rapidataai/rapids-session-replay-panel

permissions:
  contents: read

jobs:
  build-arch:
    strategy:
      matrix:
        platform: [amd64]
        include:
          - platform: amd64
            runner: blacksmith-8vcpu-ubuntu-2204
            docker_platform: linux/amd64
            suffix: amd64
    runs-on: ${{ matrix.runner }}
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: useblacksmith/setup-docker-builder@v1

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Authenticate to Google Cloud
        id: auth_gar
        uses: google-github-actions/auth@v3
        with:
          token_format: access_token
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Login to GAR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth_gar.outputs.access_token }}

      # Install dependencies
      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Build and push single-arch images
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: ${{ matrix.docker_platform }}
          tags: |
            ${{ env.GAR_IMAGE }}:latest-${{ matrix.suffix }}
            ${{ env.GHCR_IMAGE }}:latest-${{ matrix.suffix }}

  publish-manifest:
    needs: build-arch
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      packages: write
      contents: read
    steps:
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Authenticate to Google Cloud
        id: auth_gar
        uses: google-github-actions/auth@v3
        with:
          token_format: access_token
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Login to GAR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth_gar.outputs.access_token }}

      - name: Create GAR multi-arch manifest
        run: |
          GAR_IMAGE_LOWER=$(echo "${{ env.GAR_IMAGE }}" | tr '[:upper:]' '[:lower:]')
          docker buildx imagetools create \
            --tag "${GAR_IMAGE_LOWER}:latest" \
            "${GAR_IMAGE_LOWER}:latest-amd64"

      - name: Create GHCR multi-arch manifest
        run: |
          GHCR_IMAGE_LOWER=$(echo "${{ env.GHCR_IMAGE }}" | tr '[:upper:]' '[:lower:]')
          docker buildx imagetools create \
            --tag "${GHCR_IMAGE_LOWER}:latest" \
            "${GHCR_IMAGE_LOWER}:latest-amd64"
