name: Release and Publish
on:
  workflow_dispatch:
    inputs:
      version_part:
        description: 'Version part to bump (patch, minor, major)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
jobs:
  release-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Configure Git
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

      - name: Get current version
        id: current_version
        run: |
          old_version=$(node -p "require('./package.json').version")
          echo "old_version=$old_version" >> $GITHUB_OUTPUT

      - name: Update version
        id: update_version
        run: |
          npm version ${{ github.event.inputs.version_part }} --no-git-tag-version
          new_version=$(node -p "require('./package.json').version")
          echo "new_version=$new_version" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        run: |
          git add package.json package-lock.json
          git commit -m "Bump version from ${{ steps.current_version.outputs.old_version }} to ${{ steps.update_version.outputs.new_version }}"
          git push

      - name: Create and push tag
        run: |
          git tag v${{ steps.update_version.outputs.new_version }}
          git push origin v${{ steps.update_version.outputs.new_version }}

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: List dist contents
        run: ls -lah dist/

      - name: Create dist zip
        run: |
          mkdir -p rapids-preview
          cp -r dist/* rapids-preview/
          zip -r rapids-preview-v${{ steps.update_version.outputs.new_version }}.zip rapids-preview
          rm -rf rapids-preview

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.update_version.outputs.new_version }}
          name: Release v${{ steps.update_version.outputs.new_version }}
          files: |
            rapids-preview-v${{ steps.update_version.outputs.new_version }}.zip
          body: |
            Release version ${{ steps.update_version.outputs.new_version }}

            ## Installation
            1. Download the zip file
            2. Extract it to your Grafana plugins directory
            3. Restart Grafana
